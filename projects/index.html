<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все работы — NEWERZI</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'UNCAGE SemiBold';
            src: url('fonts/UNCAGE-SemiBold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Neutral Face';
            src: url('fonts/NeutralFace-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Neutral Face';
            src: url('fonts/NeutralFace-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Manrope', sans-serif;
            padding: 20px 0 0 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
        }

        .header-center {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.15em;
            line-height: 1;
            text-align: center;
            flex: 1;
            padding: 0 15px;
            cursor: default;
            user-select: none;
        }

        .header-right {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
        }

        /* ===== ЯЗЫК ===== */
        .language {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Manrope', sans-serif;
            font-size: 22px;
            color: #1a1a1a;
            line-height: 1;
            margin-bottom: 30px;
        }

        .language a {
            text-decoration: none;
            color: #1a1a1a;
            transition: opacity 0.2s;
            cursor: pointer;
        }
        .language a:hover { opacity: 0.6; }
        .language .rus { font-weight: 700; }
        .language .eng { font-weight: 500; }
        .language .divider { font-weight: 300; color: #999; }

        .language img {
            width: 1.2em;
            height: 0.8em;
            object-fit: contain;
            margin-left: 6px;
        }

        /* ===== КНОПКА НАЗАД ===== */
        .back-btn {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 22px;
            color: #ffffff;
            background: #1a1a1a;
            padding: 8px 24px;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: opacity 0.3s, background 0.3s;
            display: inline-block;
            border: none;
            margin-bottom: 30px;
            cursor: pointer;
        }
        .back-btn:hover { background: #333333; }

        /* ===== ЗАГОЛОВОК ===== */
        .page-title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 64px;
            color: #1a1a1a;
            margin-bottom: 50px;
        }

        /* ===== СЕТКА РАБОТ ===== */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-bottom: 60px;
        }

        .work-item {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: #1a1a1a;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .work-item:hover {
            transform: translateY(-6px);
        }

        .work-item img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1765 / 1176.67;
            object-fit: cover;
        }

        .work-item .work-title {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 28px;
            margin-top: 16px;
            text-align: center;
        }

        /* ===== АНИМАЦИЯ ===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        @media (max-width: 992px) {
            .container { padding: 0 20px; }
            .works-grid { grid-template-columns: 1fr; gap: 30px; }
            .page-title { font-size: 44px; }
        }

        @media (max-width: 768px) {
            body { padding: 15px 0 0 0; }
            .container { padding: 0 15px; }
            .logo, .header-center, .header-right { font-size: 16px; }
            .language { font-size: 18px; }
            .page-title { font-size: 32px; }
            .work-item .work-title { font-size: 22px; }
        }

        @media (max-width: 480px) {
            body { padding: 10px 0 0 0; }
            .container { padding: 0 10px; }
            .header { flex-wrap: wrap; gap: 4px; margin-bottom: 20px; }
            .header-center { order: 3; flex-basis: 100%; padding: 3px 0 0; }
            .logo, .header-right { font-size: 14px; }
            .header-center { font-size: 14px; }
            .language { font-size: 16px; }
            .page-title { font-size: 24px; }
            .work-item .work-title { font-size: 18px; }
            .back-btn { font-size: 16px; padding: 6px 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ШАПКА -->
    <header class="header">
        <div class="logo">NEWERZI</div>
        <div class="header-center">* * *</div>
        <div class="header-right">DESIGN</div>
    </header>

    <!-- ЯЗЫК -->
    <div class="language">
        <a href="#" class="rus" id="lang-ru">рус</a>
        <span class="divider">/</span>
        <a href="#" class="eng" id="lang-eng">eng</a>
        <img src="images/russia.png" alt="flag" id="flag-icon">
    </div>

    <!-- НАЗАД -->
    <a href="../" class="back-btn" id="back-btn">← НАЗАД</a>

    <!-- ЗАГОЛОВОК -->
    <h1 class="page-title" id="page-title">Все работы</h1>

    <!-- СЕТКА РАБОТ -->
    <div class="works-grid" id="works-grid">

        <!-- РАБОТА 1 -->
        <a href="work1/" class="work-item reveal reveal-delay-1" id="work1-link">
            <img src="images/project1.jpg" alt="WEXON NETWORK" id="work1-img">
            <span class="work-title" id="work1-title">WEXON NETWORK</span>
        </a>

        <!-- РАБОТА 2 -->
        <a href="work2/" class="work-item reveal reveal-delay-2" id="work2-link">
            <img src="images/project2.jpg" alt="WEXON NETWORK" id="work2-img">
            <span class="work-title" id="work2-title">WEXON NETWORK</span>
        </a>

        <!-- РАБОТА 3 (новая) -->
        <a href="#" class="work-item reveal reveal-delay-3" id="work3-link">
            <img src="images/project3.jpg" alt="Новая работа" id="work3-img">
            <span class="work-title" id="work3-title">Новая работа</span>
        </a>

        <!-- РАБОТА 4 (новая) -->
        <a href="#" class="work-item reveal reveal-delay-4" id="work4-link">
            <img src="images/project4.jpg" alt="Новая работа" id="work4-img">
            <span class="work-title" id="work4-title">Новая работа</span>
        </a>

    </div>

</div>

<script>
    // ===== ПЕРЕВОД =====
    const langRu = document.getElementById('lang-ru');
    const langEng = document.getElementById('lang-eng');
    const flagIcon = document.getElementById('flag-icon');
    const backBtn = document.getElementById('back-btn');

    const translations = {
        ru: {
            pageTitle: 'Все работы',
            back: '← НАЗАД',
            flag: 'images/russia.png',
            work1: 'WEXON NETWORK',
            work2: 'WEXON NETWORK',
            work3: 'Новая работа',
            work4: 'Новая работа'
        },
        en: {
            pageTitle: 'All Works',
            back: '← BACK',
            flag: 'images/usa.png',
            work1: 'WEXON NETWORK',
            work2: 'WEXON NETWORK',
            work3: 'New Work',
            work4: 'New Work'
        }
    };

    function updateLanguage(lang) {
        const t = translations[lang];

        document.getElementById('page-title').textContent = t.pageTitle;
        backBtn.textContent = t.back;
        flagIcon.src = t.flag;

        document.getElementById('work1-title').textContent = t.work1;
        document.getElementById('work2-title').textContent = t.work2;
        document.getElementById('work3-title').textContent = t.work3;
        document.getElementById('work4-title').textContent = t.work4;

        document.querySelectorAll('.language a').forEach(el => {
            el.style.fontWeight = '500';
        });
        if (lang === 'ru') {
            document.querySelector('.rus').style.fontWeight = '700';
        } else {
            document.querySelector('.eng').style.fontWeight = '700';
        }
    }

    langRu.addEventListener('click', function(e) {
        e.preventDefault();
        updateLanguage('ru');
    });

    langEng.addEventListener('click', function(e) {
        e.preventDefault();
        updateLanguage('en');
    });

    updateLanguage('ru');

    // ===== АНИМАЦИЯ ПРИ СКРОЛЛЕ =====
    const revealElements = document.querySelectorAll('.reveal');

    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    });

    revealElements.forEach(el => {
        revealObserver.observe(el);
    });
</script>

</body>
</html>
