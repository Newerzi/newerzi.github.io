<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работа — SweetSpot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background: #FFF;
            color: #000;
        }

        header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 30px 60px;
            background: #FFF;
            z-index: 10;
        }

        .logo {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .back-btn {
            display: inline-block;
            padding: 14px 26px;
            background: #000;
            color: #FFF;
            text-decoration: none;
            font-weight: 700;
            border-radius: 10px;
        }

        .work-image {
            display: block;
            max-width: 1000px;
            width: 90%;
            margin: 60px auto;
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEWERZI</div>
        <a href="../index.html" class="back-btn">← На главную</a>
    </header>

    <img class="work-image" src="../works/w1.png" alt="SweetSpot">

</body>
</html>
