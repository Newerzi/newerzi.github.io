<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работа — SweetSpot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== БАЗА ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray-bg: #f4f4f4;
            --shadow-sm: 0 16px 40px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--white);
            color: var(--black);
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* ===== ШАПКА (ИДЕНТИЧНА ГЛАВНОЙ) ===== */
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 80px;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        @media (max-width: 900px) {
            .header {
                padding: 20px 24px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 16px 16px;
            }
        }

        .logo {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 0.5px;
            color: var(--black);
            cursor: default;
            user-select: none;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 18px;
            }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 14px 30px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 480px) {
            .back-btn {
                padding: 10px 18px;
                font-size: 13px;
            }
        }

        /* ===== КОНТЕНТ ===== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }

        @media (max-width: 900px) {
            .container {
                padding: 0 24px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }
        }

        /* ===== ИЗОБРАЖЕНИЕ ===== */
        .work-image {
            width: 100%;
            max-width: 1000px;
            margin: 60px auto 0;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            display: block;
            background: var(--gray-bg);
            min-height: 300px;
            object-fit: cover;
        }

        @media (max-width: 480px) {
            .work-image {
                margin: 30px auto 0;
                min-height: 200px;
                border-radius: 12px;
            }
        }

        /* ===== ИНФОРМАЦИЯ О РАБОТЕ ===== */
        .work-info {
            margin-top: 48px;
            padding-bottom: 60px;
        }

        @media (max-width: 480px) {
            .work-info {
                margin-top: 30px;
                padding-bottom: 40px;
            }
        }

        .work-title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 48px;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        @media (max-width: 900px) {
            .work-title {
                font-size: 36px;
            }
        }

        @media (max-width: 480px) {
            .work-title {
                font-size: 28px;
            }
        }

        .work-description {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 18px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.7);
            max-width: 700px;
        }

        @media (max-width: 480px) {
            .work-description {
                font-size: 15px;
                line-height: 1.5;
            }
        }

        /* ===== ДОПОЛНИТЕЛЬНОЕ ИЗОБРАЖЕНИЕ (СКРЫТО, ПОКА НЕТ) ===== */
        .work-image-extra {
            width: 100%;
            max-width: 1000px;
            margin-top: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            display: block;
            background: var(--gray-bg);
            min-height: 200px;
            object-fit: cover;
        }

        /* ===== КНОПКА "НАВЕРХ" ===== */
        .scroll-top {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
        }

        .scroll-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-top:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }

        .scroll-top:active {
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            .scroll-top {
                bottom: 20px;
                right: 20px;
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
        }

        /* ===== АНИМАЦИЯ ПОЯВЛЕНИЯ ===== */
        .work-image,
        .work-info {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.7s ease forwards;
        }

        .work-info { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== МЕТКА ДЛЯ ЗАМЕТКИ ===== */
        /* 
            📝 ДЛЯ ДОБАВЛЕНИЯ ДОПОЛНИТЕЛЬНОГО ИЗОБРАЖЕНИЯ:
            Раскомментируй блок ниже и замени src на свой файл:
        */
        /*
        <img src="images/extra-image.png" alt="Дополнительное изображение" class="work-image-extra" loading="lazy">
        */
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <div class="logo">NEWERZI</div>
        <a href="../../../index.html" class="back-btn">← На главную</a>
    </header>

    <!-- ===== КОНТЕНТ ===== -->
    <main class="container">

        <!-- Основное изображение -->
        <img src="w1.png" alt="SweetSpot — дизайн проект" class="work-image" loading="lazy">

        <!-- Информация о работе -->
        <div class="work-info">
            <h1 class="work-title">SweetSpot</h1>
            <p class="work-description">
                Дизайн лендинга для сервиса по поиску сладких мест в городе. 
                Разработана современная визуальная концепция с акцентом на 
                уют и атмосферу. Проект включает адаптивную версию для 
                мобильных устройств и продуманную систему навигации.
            </p>

            <!-- 
                📝 ДЛЯ ДОБАВЛЕНИЯ ДОПОЛНИТЕЛЬНОГО ИЗОБРАЖЕНИЯ:
                Раскомментируй строку ниже и замени src на путь к файлу.
                Удали эту заметку после добавления.
            -->
            <!-- <img src="images/extra-image.png" alt="Дополнительное изображение" class="work-image-extra" loading="lazy"> -->
        </div>

    </main>

    <!-- ===== КНОПКА "НАВЕРХ" ===== -->
    <button class="scroll-top" id="scrollTop" aria-label="Наверх">
        ↑
    </button>

    <script>
        // ===== КНОПКА "НАВЕРХ" =====
        const scrollBtn = document.getElementById('scrollTop');

        window.addEventListener('scroll', function() {
            if (window.scrollY > 400) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });

        scrollBtn.addEventListener('click', function() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>

</body>
</html>
