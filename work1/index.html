<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEXON NETWORK — NEWERZI</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Manrope', sans-serif;
            padding: 20px 30px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== ШАПКА КАК НА ГЛАВНОЙ ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0;
            margin-bottom: 60px;
            padding-top: 20px;
        }

        .logo {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            text-decoration: none;
        }

        .header-center {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.15em;
            line-height: 1;
            text-align: center;
            flex: 1;
            padding: 0 15px;
        }

        .header-right {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            text-decoration: none;
        }

        /* ===== ОСНОВНОЙ БЛОК ===== */
        .work-wrapper {
            display: flex;
            gap: 60px;
            align-items: flex-start;
            margin-top: 20px;
        }

        .work-left {
            flex: 0 0 45%;
            display: flex;
            flex-direction: column;
        }

        .work-left .project-header {
            font-family: 'Manrope', sans-serif;
            font-weight: 500;
            font-size: 28px;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }

        .work-image {
            width: 100%;
            max-width: 100%;
        }

        .work-image img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1765 / 1176.67;
            object-fit: cover;
        }

        /* ===== ПРАВАЯ ЧАСТЬ ===== */
        .work-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 80px 0 0 40px;
            max-width: 80%;
            position: relative;
        }

        .work-name {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 90px;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: right;
            width: 100%;
            margin-bottom: 16px;
        }

        .work-description {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 28px;
            color: #1a1a1a;
            line-height: 1.2;
            text-align: justify;
            width: 85%;
            margin-bottom: 30px;
            margin-left: auto;
        }

        /* ===== КНОПКА НАЗАД С ЧЁРНЫМ ФОНОМ ПО ПРАВОЙ ГРАНИЦЕ ===== */
        .back-btn {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 40px;
            color: #ffffff;
            background: #1a1a1a;
            padding: 16px 48px;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: opacity 0.3s, background 0.3s;
            display: inline-block;
            text-align: right;
            align-self: flex-end;
            margin-top: auto;
            border: none;
        }

        .back-btn:hover {
            background: #333333;
        }

        /* ===== АНИМАЦИЯ ===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        @media (max-width: 1200px) {
            .work-name { font-size: 60px; }
            .work-description { font-size: 22px; }
            .back-btn { font-size: 32px; padding: 14px 36px; }
        }

        @media (max-width: 992px) {
            .work-wrapper { flex-direction: column; gap: 30px; }
            .work-left { flex: 0 0 100%; }
            .work-right { padding: 0; max-width: 100%; }
            .work-name { text-align: left; font-size: 50px; }
            .work-description { text-align: left; width: 100%; margin-left: 0; }
            .back-btn { align-self: flex-start; text-align: center; width: 100%; }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .logo, .header-center, .header-right { font-size: 16px; }
            .work-name { font-size: 36px; }
            .work-description { font-size: 18px; }
            .back-btn { font-size: 24px; padding: 12px 28px; }
            .work-left .project-header { font-size: 22px; }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .header { flex-wrap: wrap; gap: 4px; margin-bottom: 30px; }
            .header-center { order: 3; flex-basis: 100%; padding: 3px 0 0; }
            .logo, .header-right { font-size: 14px; }
            .header-center { font-size: 14px; }
            .work-name { font-size: 28px; }
            .work-description { font-size: 15px; }
            .back-btn { font-size: 18px; padding: 10px 20px; }
            .work-left .project-header { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ШАПКА КАК НА ГЛАВНОЙ -->
    <header class="header">
        <a href="../" class="logo">NEWERZI</a>
        <div class="header-center">* * *</div>
        <a href="../" class="header-right">DESIGN</a>
    </header>

    <!-- ОСНОВНОЙ БЛОК -->
    <div class="work-wrapper">

        <!-- ЛЕВАЯ ЧАСТЬ -->
        <div class="work-left reveal reveal-delay-1">
            <div class="project-header">ПРОЕКТ [01]</div>
            <div class="work-image">
                <img src="../images/project1.jpg" alt="WEXON NETWORK">
            </div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ -->
        <div class="work-right reveal reveal-delay-2">
            <div class="work-name">WEXON NETWORK</div>
            <div class="work-description">
                Бизнес-мессенджер, где разговор незаметно управляет рабочим процессом, а помощь появляется лишь в нужный момент, словно её уже ожидали.
            </div>
            <a href="../" class="back-btn">← НАЗАД</a>
        </div>

    </div>

</div>

<script>
    const revealElements = document.querySelectorAll('.reveal');

    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    });

    revealElements.forEach(el => {
        revealObserver.observe(el);
    });
</script>

</body>
</html>
