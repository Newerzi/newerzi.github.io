<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEXON NETWORK — NEWERZI</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Manrope', sans-serif;
            padding: 20px 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0;
            margin-bottom: 40px;
            padding-top: 10px;
        }

        .logo {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            text-decoration: none;
        }

        .header-center {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.15em;
            line-height: 1;
            text-align: center;
            flex: 1;
            padding: 0 15px;
        }

        .header-right {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            text-decoration: none;
        }

        /* ===== ЯЗЫК ===== */
        .language {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Manrope', sans-serif;
            font-size: 22px;
            color: #1a1a1a;
            line-height: 1;
            margin-bottom: 20px;
        }

        .language a {
            text-decoration: none;
            color: #1a1a1a;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .language a:hover {
            opacity: 0.6;
        }

        .language .rus {
            font-weight: 700;
        }

        .language .eng {
            font-weight: 500;
        }

        .language .divider {
            font-weight: 300;
            color: #999;
        }

        .language img {
            width: 1.2em;
            height: 0.8em;
            object-fit: contain;
            margin-left: 6px;
        }

        /* ===== КНОПКА НАЗАД ===== */
        .back-btn {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 22px;
            color: #ffffff;
            background: #1a1a1a;
            padding: 8px 24px;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: opacity 0.3s, background 0.3s;
            display: inline-block;
            border: none;
            margin-bottom: 16px;
        }

        .back-btn:hover {
            background: #333333;
        }

        /* ===== ОСНОВНОЙ БЛОК ===== */
        .work-wrapper {
            display: flex;
            gap: 60px;
            align-items: flex-start;
            margin-top: 10px;
        }

        .work-left {
            flex: 0 0 50%;
            display: flex;
            flex-direction: column;
            margin-left: -30px;
        }

        .work-image {
            width: 100%;
            max-width: 100%;
        }

        .work-image img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1765 / 1176.67;
            object-fit: cover;
        }

        /* ===== ПРАВАЯ ЧАСТЬ ===== */
        .work-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 0 0 0 40px;
            max-width: 80%;
            position: relative;
        }

        .work-name {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 90px;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: right;
            width: 100%;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .work-description {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 28px;
            color: #1a1a1a;
            line-height: 1.2;
            text-align: justify;
            width: 85%;
            margin-left: auto;
        }

        /* ===== АНИМАЦИЯ ===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }

        @media (max-width: 1200px) {
            .work-name { font-size: 60px; }
            .work-description { font-size: 22px; }
            .back-btn { font-size: 18px; padding: 6px 20px; }
        }

        @media (max-width: 992px) {
            .container { padding: 0 20px; }
            .work-wrapper { flex-direction: column; gap: 30px; }
            .work-left { flex: 0 0 100%; margin-left: -20px; }
            .work-right { padding: 0; max-width: 100%; }
            .work-name { text-align: left; font-size: 50px; }
            .work-description { text-align: left; width: 100%; margin-left: 0; }
        }

        @media (max-width: 768px) {
            body { padding: 15px 0; }
            .container { padding: 0 15px; }
            .logo, .header-center, .header-right { font-size: 16px; }
            .work-name { font-size: 36px; }
            .work-description { font-size: 18px; }
            .back-btn { font-size: 16px; padding: 6px 16px; }
            .work-left { margin-left: -15px; }
        }

        @media (max-width: 480px) {
            body { padding: 10px 0; }
            .container { padding: 0 10px; }
            .header { flex-wrap: wrap; gap: 4px; margin-bottom: 20px; }
            .header-center { order: 3; flex-basis: 100%; padding: 3px 0 0; }
            .logo, .header-right { font-size: 14px; }
            .header-center { font-size: 14px; }
            .language { font-size: 16px; }
            .work-name { font-size: 28px; }
            .work-description { font-size: 15px; }
            .back-btn { font-size: 14px; padding: 4px 14px; }
            .work-left { margin-left: -10px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ШАПКА -->
    <header class="header">
        <a href="../" class="logo">NEWERZI</a>
        <div class="header-center">* * *</div>
        <a href="../" class="header-right">DESIGN</a>
    </header>

    <!-- ЯЗЫК -->
    <div class="language">
        <a href="#" class="rus" id="lang-ru">рус</a>
        <span class="divider">/</span>
        <a href="#" class="eng" id="lang-eng">eng</a>
        <img src="../images/russia.png" alt="flag" id="flag-icon">
    </div>

    <!-- ОСНОВНОЙ БЛОК -->
    <div class="work-wrapper">

        <!-- ЛЕВАЯ ЧАСТЬ (изображение вплотную к левому краю) -->
        <div class="work-left reveal reveal-delay-1">
            <div class="work-image">
                <img src="../images/project1.jpg" alt="WEXON NETWORK">
            </div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ -->
        <div class="work-right reveal reveal-delay-2">
            <a href="../" class="back-btn">← НАЗАД</a>
            <div class="work-name" id="work-name">WEXON NETWORK</div>
            <div class="work-description" id="work-desc">
                Бизнес-мессенджер, где разговор незаметно управляет рабочим процессом, а помощь появляется лишь в нужный момент, словно её уже ожидали.
            </div>
        </div>

    </div>

</div>

<script>
    // ===== ПЕРЕВОД =====
const langRu = document.getElementById('lang-ru');
const langEng = document.getElementById('lang-eng');
const flagIcon = document.getElementById('flag-icon');
const backBtn = document.querySelector('.back-btn'); // добавляем ссылку на кнопку

const translations = {
    ru: {
        name: 'WEXON NETWORK',
        desc: 'Бизнес-мессенджер, где разговор незаметно управляет рабочим процессом, а помощь появляется лишь в нужный момент, словно её уже ожидали.',
        back: '← НАЗАД',
        flag: '../images/russia.png'
    },
    en: {
        name: 'WEXON NETWORK',
        desc: 'Business messenger where conversation seamlessly manages workflow, and help appears only when needed, as if it was already expected.',
        back: '← BACK',
        flag: '../images/usa.png'
    }
};

function updateLanguage(lang) {
    const t = translations[lang];

    document.getElementById('work-name').textContent = t.name;
    document.getElementById('work-desc').textContent = t.desc;
    backBtn.textContent = t.back; // меняем текст кнопки
    flagIcon.src = t.flag;

    document.querySelectorAll('.language a').forEach(el => {
        el.style.fontWeight = '500';
    });
    if (lang === 'ru') {
        document.querySelector('.rus').style.fontWeight = '700';
    } else {
        document.querySelector('.eng').style.fontWeight = '700';
    }
}

    langRu.addEventListener('click', function(e) {
        e.preventDefault();
        updateLanguage('ru');
    });

    langEng.addEventListener('click', function(e) {
        e.preventDefault();
        updateLanguage('en');
    });

    updateLanguage('ru');

    // ===== АНИМАЦИЯ ПРИ СКРОЛЛЕ =====
    const revealElements = document.querySelectorAll('.reveal');

    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    });

    revealElements.forEach(el => {
        revealObserver.observe(el);
    });
</script>

</body>
</html>
