<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEXON NETWORK — NEWERZI</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Manrope', sans-serif;
            padding: 20px 30px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0;
            margin-bottom: 60px;
            padding-top: 20px;
        }

        .logo {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            text-decoration: none;
        }

        .header-center {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.15em;
            line-height: 1;
            text-align: center;
            flex: 1;
            padding: 0 15px;
        }

        .header-right {
            font-family: 'UNCAGE SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            flex-shrink: 0;
            text-decoration: none;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        .work-content {
            padding-top: 20px;
        }

        .back-link {
            display: inline-block;
            font-family: 'Manrope', sans-serif;
            font-weight: 500;
            font-size: 18px;
            color: #1a1a1a;
            text-decoration: none;
            margin-bottom: 40px;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.6;
        }

        .work-title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 80px;
            color: #1a1a1a;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .work-description {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 28px;
            color: #1a1a1a;
            line-height: 1.5;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .work-image {
            width: 100%;
            max-width: 1000px;
            display: block;
        }

        .work-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .logo, .header-center, .header-right { font-size: 16px; }
            .work-title { font-size: 44px; }
            .work-description { font-size: 20px; }
            .back-link { font-size: 16px; }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .header { flex-wrap: wrap; gap: 4px; margin-bottom: 30px; }
            .header-center { order: 3; flex-basis: 100%; padding: 3px 0 0; }
            .logo, .header-right { font-size: 14px; }
            .header-center { font-size: 14px; }
            .work-title { font-size: 32px; }
            .work-description { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <header class="header">
        <a href="../" class="logo">NEWERZI</a>
        <div class="header-center">* * *</div>
        <a href="../" class="header-right">DESIGN</a>
    </header>

    <div class="work-content">

        <a href="../" class="back-link reveal reveal-delay-1">← Назад</a>

        <h1 class="work-title reveal reveal-delay-2">WEXON NETWORK</h1>

        <p class="work-description reveal reveal-delay-3">
            Бизнес-мессенджер, где разговор незаметно управляет рабочим процессом, а помощь появляется лишь в нужный момент, словно её уже ожидали.
        </p>

        <div class="work-image reveal reveal-delay-4">
            <img src="../images/project2.jpg" alt="WEXON NETWORK">
        </div>

    </div>

</div>

<script>
    const revealElements = document.querySelectorAll('.reveal');

    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    });

    revealElements.forEach(el => {
        revealObserver.observe(el);
    });
</script>

</body>
</html>
