<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Дизайн для онлайн-проектов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111;
      line-height: 1.6;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 22px;
      margin-top: 60px;
      margin-bottom: 16px;
    }
    p {
      margin-bottom: 12px;
      color: #333;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin-bottom: 8px;
    }
    .contact {
      margin-top: 40px;
    }
    .contact a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">Newerzi</div>
    <a href="#contact" class="btn">Связаться</a>
  </header>

  <main class="hero">
    <div class="hero-text">
      <h1>Дизайн за гранью цифрового мира</h1>
      <p>
        Создаю аккуратный визуал для онлайн-проектов, брендов и контента.
        Фокус — структура, смысл и чистота.
      </p>
    </div>

    <div class="hero-image">
      <img src="img/hero.png" alt="Абстрактный дизайн">
    </div>
  </main>

  <section class="works">
    <h2>Работы</h2>
    <div class="grid">
      <img src="img/work1.jpg">
      <img src="img/work2.jpg">
      <img src="img/work3.jpg">
    </div>
  </section>

  <section class="contact" id="contact">
    <h2>Контакты</h2>
    <p>Email: yourmail@mail.com</p>
    <p>Telegram: @username</p>
  </section>
</body>
</html>
