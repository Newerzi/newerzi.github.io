<!DOCTYPE html>
<html lang="ru">
<head>
  <style>
    .header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 60px;
}

.logo {
  font-weight: 600;
  font-size: 18px;
}

.btn {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 20px;
  background: #000;
  color: #fff;
  font-size: 14px;
}

.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 80px 60px;
  gap: 60px;
}

.hero h1 {
  font-size: 56px;
  line-height: 1.1;
}

.hero p {
  margin-top: 20px;
  max-width: 420px;
  color: #444;
}

.hero-image img {
  width: 100%;
  max-width: 500px;
  filter: blur(0.3px);
}

.works {
  padding: 100px 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}

.grid img {
  width: 100%;
  border-radius: 16px;
}

.contact {
  padding: 80px 60px;
  background: #f5f5f5;
}

  </style>
</head>
<body>
  <header class="header">
    <div class="logo">Newerzi</div>
    <a href="#contact" class="btn">Связаться</a>
  </header>
  <main class="hero">
    <div class="hero-text">
      <h1>Дизайн за гранью цифрового мира</h1>
      <p>
        Создаю аккуратный визуал для онлайн-проектов, брендов и контента.
        Фокус — структура, смысл и чистота.
      </p>
    </div>
    <div class="hero-image">
      <img src="img/hero.png" alt="Абстрактный дизайн">
    </div>
  </main>
  <section class="works">
    <h2>Работы</h2>
    <div class="grid">
      <img src="img/work1.jpg">
      <img src="img/work2.jpg">
      <img src="img/work3.jpg">
    </div>
  </section>
  <section class="contact" id="contact">
    <h2>Контакты</h2>
    <p>Email: yourmail@mail.com</p>
    <p>Telegram: @username</p>
  </section>
</body>
</html>
