<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Layout</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Подключение шрифтов Inter и Uncage из Google Fonts или локальных файлов -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Примечание: шрифт Uncage Semibold, вероятно, является пользовательским. 
    Для веб-использования его необходимо подключить через @font-face или подобным образом. 
    В этом примере используется резервный шрифт. -->
    <style>
        @font-face {
            font-family: 'Uncage Semibold';
            src: url('Uncage-Semibold.woff2') format('woff2'),
                 url('Uncage-Semibold.woff') format('woff');
            font-weight: 600;
            font-style: normal;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-top">NEWERZI</span>
            <span class="logo-bottom">DESIGN</span>
        </div>
        <nav class="navigation">
            <a href="#about">About</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#feedback">Feedback</a>
            <a href="#contact">Contact</a>
        </nav>
        <button class="button">Заказать</button>
    </header>
</body>
</html>
